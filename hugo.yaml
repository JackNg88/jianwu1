baseURL: 'https://jackng88.github.io/jianwu1/'
languageCode: en-us
title: Jian Wu

# Use Hugo Blox Academic CV theme
module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-reveal

outputs:
  home:
    - HTML
    - RSS
    - WebAppManifest
    - headers
    - redirects
  section:
    - HTML
    - RSS

enableRobotsTXT: true
paginate: 10
summaryLength: 30

params:
  appearance:
    theme_day: minimal
    theme_night: minimal
    font: native
    font_size: L

  header:
    navbar:
      enable: true
      align: l
      show_logo: true
      show_day_night: true
      show_search: true
      highlight_active_link: true

  footer:
    copyright:
      notice: '© {year} Jian Wu · Powered by [Hugo Blox](https://hugoblox.com)'

  features:
    syntax_highlighter:
      enable: true
      theme_light: github-light
      theme_dark: dracula
    math:
      enable: false

  seo:
    site_type: Person
    org_name: 'Justus Liebig University Giessen'
    description: 'Jian Wu – Researcher in lung infection genomics, single-cell RNA-seq and stem cell biology.'

menus:
  main:
    - name: Home
      url: '#about'
      weight: 10
    - name: Experience
      url: '#experience'
      weight: 20
    - name: Publications
      url: '#publications'
      weight: 30
    - name: Projects
      url: project/
      weight: 40
    - name: Posts
      url: post/
      weight: 50
    - name: Contact
      url: '#contact'
      weight: 60
    - name: CV
      url: uploads/cv.pdf
      weight: 70
